name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel stale runs on the same branch — saves CI minutes on force-pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint
  # ---------------------------------------------------------------------------
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Backend: pytest against a real Postgres service container
  # ---------------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wadecv
          POSTGRES_PASSWORD: wadecv
          POSTGRES_DB: wadecv_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U wadecv" --health-interval=10s
          --health-timeout=5s --health-retries=5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://wadecv:wadecv@localhost:5432/wadecv_test
      DATABASE_URL: postgresql+asyncpg://wadecv:wadecv@localhost:5432/wadecv_test
      JWT_SECRET_KEY: ci-jwt-secret-not-for-production-use-only-in-tests
      ENVIRONMENT: development
      SENTRY_DSN: ""
      LOG_JSON: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      - name: Verify migrations apply cleanly
        run: alembic upgrade head

      - name: Verify migrations are reversible (down 1, back up)
        run: |
          alembic downgrade -1
          alembic upgrade head

      - name: Run pytest with coverage
        run: pytest

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Frontend: lint + typecheck
  # ---------------------------------------------------------------------------
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check

  # ---------------------------------------------------------------------------
  # Frontend: Vitest unit tests
  # ---------------------------------------------------------------------------
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:ci

  # ---------------------------------------------------------------------------
  # Generated client sync — fails if the hey-api client is out of date
  # ---------------------------------------------------------------------------
  generated-client-sync:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wadecv
          POSTGRES_PASSWORD: wadecv
          POSTGRES_DB: wadecv_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U wadecv" --health-interval=10s
          --health-timeout=5s --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://wadecv:wadecv@localhost:5432/wadecv_test
      JWT_SECRET_KEY: ci-jwt-secret-not-for-production-use-only-in-tests
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply migrations and dump OpenAPI
        working-directory: backend
        run: |
          alembic upgrade head
          python -c "import json; from app.main import app; open('openapi.json','w').write(json.dumps(app.openapi(), indent=2))"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Regenerate client
        working-directory: frontend
        run: npm run gen:api

      - name: Fail if client drifted
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated client is out of sync with OpenAPI."
            echo "Run 'npm run gen:api' locally, commit the diff, and push."
            git diff --stat
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Playwright smoke tests — full stack in background
  # ---------------------------------------------------------------------------
  frontend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wadecv
          POSTGRES_PASSWORD: wadecv
          POSTGRES_DB: wadecv_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U wadecv" --health-interval=10s
          --health-timeout=5s --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://wadecv:wadecv@localhost:5432/wadecv_test
      JWT_SECRET_KEY: ci-jwt-secret-not-for-production-use-only-in-tests
      ENVIRONMENT: development
      SENTRY_DSN: ""
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Migrate DB
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --port 8000 > backend.log 2>&1 &
          for i in {1..30}; do
            curl -sf http://localhost:8000/api/health && break
            sleep 1
          done

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-log
          path: backend/backend.log

  # ---------------------------------------------------------------------------
  # Secret scan — free OSS gitleaks
  # ---------------------------------------------------------------------------
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
